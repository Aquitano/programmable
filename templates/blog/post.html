{% load post_extras %}
<div class="mt-3">
    <article class="media content-section shadow">
        <div class="media-body">
            <div class="profile">
                <div class="row">
                    <div class="col">
                        <img class="rounded-circle account-img" src="{{ post.user.profile.image.url }}" style="width: 60px; height: auto;" alt="profile picture" />
                        <a href="{% url 'profile' post.user %}" style="text-decoration: none;" class="color-a">{{ post.user }}</a>
                    </div>
                    <div class="col"><div class="post-date">{{ post.date_published }}</div></div>
                </div>
            </div>

            <div class="post-content">{{ post.content|convert_markdown }}</div>
            <div class="row">
                <div class="col">
                    {% if post.id in liked_post_ids %}
                        <form action="{% url 'unlike-post' post.pk %}" method="post">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{{ request.path }}" />
                            <button type="submit" class="like-button liked" aria-label="Unlike post {{ post.id }}"><i class="fa-solid fa-fire"></i></button>
                            {{ post.total_likes }}
                        </form>
                    {% else %}
                        <form action="{% url 'like-post' post.pk %}" method="post">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{{ request.path }}" />
                            <button type="submit" class="like-button" aria-label="Like post {{ post.id }}"><i class="fa-solid fa-fire"></i></button>
                            {{ post.total_likes }}
                        </form>
                    {% endif %}
                </div>
                <div class="col" style="text-align: end">
                    {% if post.user == user %}
                        <a href="{% url 'edit-post' post.id %}"><i class="fa-solid fa-pen-to-square color-a"></i></a>
                        <a href="{% url 'delete-post' post.id %}"><i class="fa-solid fa-trash color-a"></i></a>
                    {% endif %}
                </div>
            </div>
        </div>
    </article>
</div>
